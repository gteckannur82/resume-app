<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior: none;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .resume-card-perspective {
            perspective: 1000px;
        }
        .resume-card-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }
        .template-glow {
            box-shadow: 0 0 40px -10px rgba(79, 70, 229, 0.2);
        }
        /* iPhone 16 Pro specific safe areas */
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
        .pt-safe {
            padding-top: env(safe-area-inset-top);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#302f39",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-secondary-fixed-variant": "#2f2ebe",
                        "on-tertiary-fixed": "#351000",
                        "primary-fixed-dim": "#c3c0ff",
                        "on-error": "#ffffff",
                        "on-surface-variant": "#464555",
                        "tertiary-container": "#a44100",
                        "primary-container": "#4f46e5",
                        "tertiary": "#7e3000",
                        "surface-tint": "#4d44e3",
                        "surface-bright": "#fcf8ff",
                        "tertiary-fixed": "#ffdbcc",
                        "on-tertiary-fixed-variant": "#7b2f00",
                        "on-secondary": "#ffffff",
                        "on-background": "#1b1b24",
                        "secondary-container": "#6063ee",
                        "on-secondary-container": "#fffbff",
                        "on-secondary-fixed": "#07006c",
                        "inverse-on-surface": "#f3effc",
                        "on-primary-fixed-variant": "#3323cc",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed-dim": "#ffb695",
                        "surface-variant": "#e4e1ee",
                        "surface": "#fcf8ff",
                        "primary": "#3525cd",
                        "outline": "#777587",
                        "secondary-fixed": "#e1e0ff",
                        "surface-container-highest": "#e4e1ee",
                        "outline-variant": "#c7c4d8",
                        "surface-container": "#f0ecf9",
                        "on-primary-fixed": "#0f0069",
                        "surface-dim": "#dcd8e5",
                        "on-primary-container": "#dad7ff",
                        "on-error-container": "#93000a",
                        "on-surface": "#1b1b24",
                        "error-container": "#ffdad6",
                        "surface-container-low": "#f5f2ff",
                        "secondary": "#4648d4",
                        "primary-fixed": "#e2dfff",
                        "secondary-fixed-dim": "#c0c1ff",
                        "background": "#fcf8ff",
                        "inverse-primary": "#c3c0ff",
                        "surface-container-high": "#eae6f4",
                        "on-tertiary-container": "#ffd2be"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "32px",
                        "lg": "24px",
                        "sm": "8px",
                        "xs": "4px",
                        "container-padding": "20px",
                        "unit": "8px",
                        "gutter": "12px",
                        "md": "16px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "display": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-md": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "display": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.015em", "fontWeight": "600"}],
                        "label-sm": ["11px", {"lineHeight": "14px", "fontWeight": "600"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background selection:bg-primary-fixed overflow-hidden">
<!-- iPhone 16 Pro Shell (Concept) -->
<main class="relative h-screen w-full flex flex-col justify-between overflow-hidden pt-safe">
<!-- Top Bar: Progress Indicator -->
<header class="px-container-padding pt-md flex items-center justify-between">
<div class="flex gap-xs w-2/3">
<div class="h-1 flex-1 bg-surface-container-highest rounded-full">
<div class="h-full w-full bg-primary-container rounded-full"></div>
</div>
<div class="h-1 flex-1 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full w-full bg-primary-container rounded-full transform origin-left"></div>
</div>
<div class="h-1 flex-1 bg-surface-container-highest rounded-full"></div>
<div class="h-1 flex-1 bg-surface-container-highest rounded-full"></div>
</div>
<button class="text-label-md font-label-md text-on-surface-variant hover:text-primary transition-colors">
                Skip
            </button>
</header>
<!-- Content Canvas -->
<section class="flex-1 flex flex-col px-container-padding pt-lg">
<!-- Headline Cluster -->
<div class="space-y-sm z-10">
<h1 class="font-display text-display text-on-surface leading-tight">
                    ATS-Optimized
                </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[85%]">
                    Our clean, structured templates are precision-engineered to bypass Applicant Tracking Systems and reach human recruiters.
                </p>
</div>
<!-- Mini-Gallery: Bento Layout with Depth -->
<div class="relative flex-1 mt-xl mb-xl">
<!-- Decorative Glow Background -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-primary/10 blur-[80px] rounded-full"></div>
<!-- Template Card 1 (Main Focus) -->
<div class="absolute top-4 left-0 right-0 z-30 resume-card-perspective">
<div class="resume-card-float template-glow bg-white p-md rounded-xl shadow-[0px_4px_20px_0px_rgba(0,0,0,0.05)] border border-outline-variant/30 transform rotate-[-2deg]">
<div class="flex items-center gap-sm mb-md">
<div class="w-10 h-10 rounded-full bg-surface-container overflow-hidden shrink-0">
<img class="w-full h-full object-cover" data-alt="A professional headshot of a smiling young executive with soft natural lighting, high-end photography style, minimalist grey background, representing a sophisticated professional persona for a resume." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBtG0ZJjnVwvZeDkb6GXRdvGuDEAHpZcE41_7gMZJOhxK5h4ZGKiCHqCMdLsYD-TQDa2INqRXIdRtD0kIACUbE6vgN4rpyoFj7KCFy9Y7yHYp2bckepdq9ECSpZpc1HAkRFLlaz-rrgUzqQTMPWZzelMi_QqrU77uhSooIgfZcWFaDdPkKcWdXHRc73egZ9s0NteVelD3l4ZGAiDNC0YyqDk2x0PolXF7vmP1KPWOhZYolLMqsFbNqDGooGEPMqRfBP4zGCTIm9a7GG"/>
</div>
<div class="space-y-xs w-full">
<div class="h-2.5 w-24 bg-on-surface/10 rounded-full"></div>
<div class="h-2 w-32 bg-on-surface/5 rounded-full"></div>
</div>
</div>
<div class="space-y-sm">
<div class="h-2 w-full bg-surface-container rounded-full"></div>
<div class="h-2 w-[90%] bg-surface-container rounded-full"></div>
<div class="h-2 w-[95%] bg-surface-container rounded-full"></div>
<div class="grid grid-cols-2 gap-sm mt-md">
<div class="h-12 bg-surface-container-low rounded-lg border border-outline-variant/20 flex flex-col justify-center px-sm gap-xs">
<div class="h-1.5 w-8 bg-primary/20 rounded-full"></div>
<div class="h-2 w-full bg-on-surface/10 rounded-full"></div>
</div>
<div class="h-12 bg-surface-container-low rounded-lg border border-outline-variant/20 flex flex-col justify-center px-sm gap-xs">
<div class="h-1.5 w-8 bg-primary/20 rounded-full"></div>
<div class="h-2 w-full bg-on-surface/10 rounded-full"></div>
</div>
</div>
</div>
<!-- ATS Check Badge -->
<div class="absolute -top-3 -right-3 bg-secondary-container text-on-secondary-container px-sm py-xs rounded-full shadow-lg flex items-center gap-xs">
<span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'wght' 700;">check_circle</span>
<span class="text-label-sm font-label-sm">98% Match</span>
</div>
</div>
</div>
<!-- Template Card 2 (Background Offset) -->
<div class="absolute top-20 right-[-10px] z-20 w-[85%]">
<div class="bg-white/80 p-md rounded-xl shadow-[0px_4px_20px_0px_rgba(0,0,0,0.03)] border border-outline-variant/20 transform rotate-[3deg] scale-95 blur-[0.5px]">
<div class="flex flex-col gap-sm">
<div class="h-3 w-16 bg-on-surface/5 rounded-full"></div>
<div class="h-2 w-full bg-surface-container rounded-full"></div>
<div class="h-2 w-full bg-surface-container rounded-full"></div>
<div class="h-2 w-[70%] bg-surface-container rounded-full"></div>
</div>
</div>
</div>
<!-- Template Card 3 (Bottom Offset) -->
<div class="absolute bottom-10 left-[-10px] z-10 w-[80%]">
<div class="bg-white/60 p-md rounded-xl shadow-[0px_4px_20px_0px_rgba(0,0,0,0.02)] border border-outline-variant/10 transform rotate-[-4deg] scale-90 blur-[1px]">
<div class="h-4 w-20 bg-on-surface/5 rounded-full mb-sm"></div>
<div class="grid grid-cols-3 gap-xs">
<div class="h-1.5 bg-surface-container rounded-full"></div>
<div class="h-1.5 bg-surface-container rounded-full"></div>
<div class="h-1.5 bg-surface-container rounded-full"></div>
</div>
</div>
</div>
</div>
<!-- Features Chips -->
<div class="flex flex-wrap gap-sm justify-center mb-xl">
<div class="px-md py-sm bg-primary/5 border border-primary/10 rounded-full flex items-center gap-xs">
<span class="material-symbols-outlined text-primary text-[18px]">document_scanner</span>
<span class="text-label-md font-label-md text-primary">Scanner Friendly</span>
</div>
<div class="px-md py-sm bg-secondary/5 border border-secondary/10 rounded-full flex items-center gap-xs">
<span class="material-symbols-outlined text-secondary text-[18px]">verified</span>
<span class="text-label-md font-label-md text-secondary">Recruiter Approved</span>
</div>
<div class="px-md py-sm bg-surface-container-high rounded-full flex items-center gap-xs">
<span class="material-symbols-outlined text-on-surface-variant text-[18px]">description</span>
<span class="text-label-md font-label-md text-on-surface-variant">PDF &amp; DocX</span>
</div>
</div>
</section>
<!-- Footer: Action Area -->
<footer class="px-container-padding pb-xl pt-lg glass-panel relative z-40">
<div class="flex flex-col gap-md">
<button class="w-full bg-primary-container text-on-primary py-md px-lg rounded-xl font-headline-md text-headline-md shadow-lg active:scale-95 transition-all duration-200 flex items-center justify-center gap-sm">
                    Next Step
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
<div class="flex justify-center">
<div class="flex items-center gap-xs">
<span class="w-1.5 h-1.5 bg-outline-variant rounded-full"></span>
<span class="w-4 h-1.5 bg-primary-container rounded-full"></span>
<span class="w-1.5 h-1.5 bg-outline-variant rounded-full"></span>
<span class="w-1.5 h-1.5 bg-outline-variant rounded-full"></span>
</div>
</div>
</div>
</footer>
<!-- Micro-interaction script -->
<script>
            document.addEventListener('DOMContentLoaded', () => {
                const button = document.querySelector('button');
                button.addEventListener('touchstart', () => {
                    button.classList.add('scale-95', 'opacity-90');
                });
                button.addEventListener('touchend', () => {
                    button.classList.remove('scale-95', 'opacity-90');
                });
            });
        </script>
</main>
</body></html>
