<body class="bg-surface">

<!-- Main Content Wrapper -->
<div class="relative z-10 flex flex-col h-full px-container-padding pt-xl pb-lg">
<!-- Brand Anchor -->
<header class="mt-12 mb-xl flex flex-col items-center">
<div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center shadow-lg mb-md">

<!-- Auth Toggle -->

<div class="toggle-slider absolute top-1 left-1 bottom-1 w-[calc(50%-4px)] bg-white shadow-sm rounded-lg z-0" id="slider"></div>
<button class="flex-1 py-2 font-label-md text-label-md z-10 text-primary transition-colors duration-300" onclick="toggleAuth('login')">Login</button>

</div>
<!-- Forms Container -->
<div class="flex-grow">
<form class="space-y-md" id="authForm">
<div class="space-y-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant px-1" id="emailLabel">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-md">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-white border border-outline-variant rounded-xl font-body-md text-on-surface focus:border-primary transition-all" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="space-y-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant px-1">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-md">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-white border border-outline-variant rounded-xl font-body-md text-on-surface focus:border-primary transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary" type="button">
<span class="material-symbols-outlined text-md">visibility</span>
</button>
</div>
</div>
<div class="space-y-sm hidden opacity-0 auth-transition" id="confirmPassContainer">
<label class="font-label-sm text-label-sm text-on-surface-variant px-1">Confirm Password</label>
<div class="relative">

</div>
<script>
        let currentMode = 'login';

        function toggleAuth(mode) {
            if (mode === currentMode) return;
            currentMode = mode;

            const slider = document.getElementById('slider');
            const submitBtn = document.getElementById('submitBtn');
            const confirmPass = document.getElementById('confirmPassContainer');
            const forgotLink = document.getElementById('forgotLink');
            const buttons = document.querySelectorAll('.bg-surface-container-low button');

            if (mode === 'signup') {
                slider.style.transform = 'translateX(100%)';
                submitBtn.textContent = 'Create Account';
                confirmPass.classList.remove('hidden');
                setTimeout(() => confirmPass.classList.add('opacity-100'), 10);
                forgotLink.style.visibility = 'hidden';
                buttons[0].classList.replace('text-primary', 'text-on-surface-variant');
                buttons[1].classList.replace('text-on-surface-variant', 'text-primary');
            } else {
                slider.style.transform = 'translateX(0%)';
                submitBtn.textContent = 'Sign In';
                confirmPass.classList.remove('opacity-100');
                setTimeout(() => confirmPass.classList.add('hidden'), 400);
                forgotLink.style.visibility = 'visible';
                buttons[1].classList.replace('text-primary', 'text-on-surface-variant');
                buttons[0].classList.replace('text-on-surface-variant', 'text-primary');
            }
        }

        // Micro-interactions for form submission
        document.getElementById('authForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.textContent;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span>';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.disabled = false;
                }, 2000);
            }, 1500);
        });
    </script>
